    /* ── Reset & Custom Properties ───────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-bg:    #F5EAD8;
      --filter-bg:   #EDE0C4;
      --accent-gold: #C8A040;
      --dark-brown:  #6B3A00;
      --text-dark:   #3A2010;
      --page-bg:     #FAF5ED;
      --card-shadow: 0 2px 14px rgba(58, 32, 16, 0.09);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--page-bg);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* ── Site Nav ────────────────────────────────────────── */
    .site-header {
      background: var(--dark-brown);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-gold);
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 1.75rem;
    }
    .nav-links a {
      color: #D4BFA0;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a.active { color: var(--accent-gold); }

    /* ── Page Hero ───────────────────────────────────────── */
    .page-hero {
      background: linear-gradient(160deg, #4A2400 0%, var(--dark-brown) 100%);
      text-align: center;
      padding: 3.5rem 1.5rem 3rem;
      border-bottom: 3px solid var(--accent-gold);
    }
    .page-hero h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--accent-gold);
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }
    .page-hero p {
      color: #C8B090;
      font-size: 0.95rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Jump Nav ────────────────────────────────────────── */
    .jump-nav {
      max-width: 960px;
      margin: 2rem auto 0;
      padding: 0 1.5rem;
    }
    .jump-nav-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--dark-brown);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.65rem;
      opacity: 0.65;
    }
    .jump-nav-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }
    .jump-nav-list a {
      display: inline-block;
      padding: 0.22rem 0.7rem;
      background: var(--panel-bg);
      border: 1.5px solid var(--accent-gold);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--dark-brown);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .jump-nav-list a:hover {
      background: var(--accent-gold);
      color: #fff;
    }

    /* ── Main Layout ─────────────────────────────────────── */
    .main-content {
      max-width: 960px;
      margin: 2.25rem auto 5rem;
      padding: 0 1.5rem;
    }

    /* ── Theme Card ──────────────────────────────────────── */
    .theme-card {
      background: var(--panel-bg);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 3rem;
      box-shadow: var(--card-shadow);
    }

    .theme-head {
      display: flex;
      align-items: stretch;
    }
    .theme-preview {
      width: 260px;
      min-width: 180px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--filter-bg);
      cursor: pointer;
      position: relative;
    }
    .theme-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s ease;
    }
    .theme-preview:hover img { transform: scale(1.03); }
    .theme-preview::after {
      content: '⤢';
      position: absolute;
      bottom: 0.5rem;
      right: 0.6rem;
      font-size: 1.1rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.15s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .theme-preview:hover::after { opacity: 1; }

    .theme-meta {
      flex: 1;
      padding: 1.6rem 1.8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.45rem;
    }
    .theme-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent-gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .theme-title {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--dark-brown);
      line-height: 1.2;
    }
    .theme-caption {
      font-size: 0.88rem;
      color: #7A5030;
      font-style: italic;
    }
    .they-heard {
      color: var(--accent-gold);
      font-weight: 700;
      font-style: normal;
    }
    .badge-new {
      display: inline-block;
      background: var(--accent-gold);
      color: #fff;
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      padding: 0.14rem 0.55rem;
      border-radius: 4px;
      text-transform: uppercase;
      align-self: flex-start;
    }

    /* ── Items Section ───────────────────────────────────── */
    .items-block {
      padding: 1.2rem 1.8rem 1.5rem;
      border-top: 2px solid var(--filter-bg);
    }
    .items-block + .items-block {
      border-top: 1.5px solid var(--filter-bg);
    }

    .items-heading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-gold);
      margin-bottom: 1rem;
    }
    .items-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--accent-gold);
      opacity: 0.25;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 0.7rem;
    }

    /* ── Item Card (zoomable) ────────────────────────────── */
    .item-card {
      background: #fffaf4;
      border-radius: 10px;
      padding: 0.65rem 0.4rem 0.55rem;
      text-align: center;
      box-shadow: 0 1px 5px rgba(58, 32, 16, 0.07);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 14px rgba(58, 32, 16, 0.18);
    }
    .item-card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      display: block;
      margin: 0 auto 0.4rem;
    }
    .item-card .item-name {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.35;
    }

    /* Background cards are slightly wider to suit landscape images */
    .bg-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .bg-grid .item-card img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(24, 10, 2, 0.82);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--panel-bg);
      border-radius: 16px;
      padding: 2rem 1.75rem 1.5rem;
      max-width: min(88vw, 520px);
      max-height: 90vh;
      overflow: auto;
      position: relative;
      transform: scale(0.88);
      transition: transform 0.22s ease;
      box-shadow: 0 12px 48px rgba(0,0,0,0.4);
    }
    .modal-overlay.open .modal-box { transform: scale(1); }

    .modal-close {
      position: absolute;
      top: 0.7rem;
      right: 0.7rem;
      width: 30px;
      height: 30px;
      background: var(--filter-bg);
      border: none;
      border-radius: 50%;
      font-size: 0.85rem;
      color: var(--dark-brown);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .modal-close:hover { background: var(--accent-gold); color: #fff; }

    .modal-nav-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.85rem;
    }
    .modal-nav-btn {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--accent-gold);
      background: var(--filter-bg);
      color: var(--dark-brown);
      font-size: 1.05rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
      line-height: 1;
    }
    .modal-nav-btn:hover:not(:disabled) {
      background: var(--accent-gold);
      color: #fff;
    }
    .modal-nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }
    .modal-img-wrap {
      flex: 1;
      text-align: center;
      min-width: 0;
    }
    .modal-img-wrap img {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
    }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding-top: 0.1rem;
    }
    .modal-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--dark-brown);
    }
    .modal-counter {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent-gold);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── Footer ──────────────────────────────────────────── */
    .site-footer {
      border-top: 1.5px solid var(--filter-bg);
      text-align: center;
      padding: 2rem 1.5rem;
      color: #9A7A5A;
      font-size: 0.8rem;
    }
    .site-footer a { color: var(--accent-gold); text-decoration: none; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 580px) {
      .page-hero h1    { font-size: 1.8rem; }
      .theme-head      { flex-direction: column; }
      .theme-preview   { width: 100%; min-width: unset; max-height: 180px; }
      .theme-meta      { padding: 1.25rem 1.25rem; }
      .theme-title     { font-size: 1.3rem; }
      .items-block     { padding: 1rem 1.25rem 1.25rem; }
      .items-grid      { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 0.5rem; }
      .item-card img   { width: 54px; height: 54px; }
      .bg-grid         { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .bg-grid .item-card img { height: 68px; }
    }
  </style>
</head>

// ── Build Jump Nav ────────────────────────────────────────────
const jumpList = document.getElementById('jump-list');
themes.forEach(t => {
  const li = document.createElement('li');
  const a  = document.createElement('a');
  a.href        = '#' + t.id;
  a.textContent = t.name + (t.isNew ? ' ✦' : '');
  li.appendChild(a);
  jumpList.appendChild(li);
});

// ── Item card builder ─────────────────────────────────────────
function itemCard(id, name, type) {
  const dir = type === 'chr' ? 'characters' : type === 'fur' ? 'furniture' : 'backgrounds';
  const src = `images/${dir}/${id}.png`;
  return `<div class="item-card"
               data-modal-src="${src}"
               data-modal-label="${name}">
    <img src="${src}" alt="${name}" loading="lazy" onerror="this.style.opacity='0.25'">
    <div class="item-name">${name}</div>
  </div>`;
}

// ── Build Theme Sections ──────────────────────────────────────
const container = document.getElementById('themes-container');

themes.forEach(t => {
  const sec = document.createElement('section');
  sec.className = 'theme-card';
  sec.id        = t.id;
  sec.innerHTML = `
    <div class="theme-head">
      <div class="theme-preview"
           data-modal-src="${t.preview}"
           data-modal-label="${t.name}">
        <img src="${t.preview}" alt="${t.name} — theme preview" loading="lazy"
             onerror="this.style.opacity='0.15'">
      </div>
      <div class="theme-meta">
        <div class="theme-eyebrow">Theme ${t.num}</div>
        <h2 class="theme-title">${t.name}</h2>
        <p class="theme-caption">
          <span class="they-heard">They heard...</span> ${t.desc}
        </p>
        ${t.isNew ? '<span class="badge-new">New</span>' : ''}
      </div>
    </div>
    <div class="items-block">
      <div class="items-heading">Characters</div>
      <div class="items-grid">${t.chr.map(([id, name]) => itemCard(id, name, 'chr')).join('')}</div>
    </div>
    <div class="items-block">
      <div class="items-heading">Furniture</div>
      <div class="items-grid">${t.fur.map(([id, name]) => itemCard(id, name, 'fur')).join('')}</div>
    </div>
    <div class="items-block">
      <div class="items-heading">Background</div>
      <div class="items-grid bg-grid">${t.bg.map(([id, name]) => itemCard(id, name, 'bg')).join('')}</div>
    </div>`;
  container.appendChild(sec);
});

// ── Modal Logic ───────────────────────────────────────────────
const overlay      = document.getElementById('modal-overlay');
const modalImg     = document.getElementById('modal-img');
const modalLabel   = document.getElementById('modal-label');
const modalCounter = document.getElementById('modal-counter');
const modalBox     = document.getElementById('modal-box');
const prevBtn      = document.getElementById('modal-prev');
const nextBtn      = document.getElementById('modal-next');

let zoomables    = [];
let currentIndex = 0;

function collectZoomables() {
  zoomables = Array.from(document.querySelectorAll('[data-modal-src]'));
}

function showAt(index) {
  currentIndex = index;
  const el = zoomables[index];
  modalImg.src             = el.dataset.modalSrc;
  modalImg.alt             = el.dataset.modalLabel;
  modalLabel.textContent   = el.dataset.modalLabel;
  modalCounter.textContent = `${index + 1} / ${zoomables.length}`;
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === zoomables.length - 1;
}

function openModal(index) {
  showAt(index);
  overlay.classList.add('open');
  overlay.removeAttribute('aria-hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < zoomables.length) showAt(next);
}

// Click on any zoomable element (theme preview or item card)
document.getElementById('themes-container').addEventListener('click', e => {
  const target = e.target.closest('[data-modal-src]');
  if (!target) return;
  const index = zoomables.indexOf(target);
  openModal(index >= 0 ? index : 0);
});

// Prev / Next buttons
prevBtn.addEventListener('click', () => navigate(-1));
nextBtn.addEventListener('click', () => navigate(1));

// Close on overlay background click (not on the box itself)
overlay.addEventListener('click', e => {
  if (!modalBox.contains(e.target)) closeModal();
});

// Close button
document.getElementById('modal-close').addEventListener('click', closeModal);

// Keyboard: Escape to close, ←→ to navigate
document.addEventListener('keydown', e => {
  if (!overlay.classList.contains('open')) return;
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// Collect all zoomable elements after rendering
collectZoomables();
</script>
