  <meta name="description" content="All themes in Roomel — collect characters and furniture from each themed world and build your own diorama." />

    Adjust paths to match your server directory structure before deploying.
  -->
  <style>
    :root {
      --bg:        #fffaf0;
      --paper:     #ffffff;
      --ink:       #3a3022;
      --muted:     #756b5b;
      --gold:      #b8912e;
      --gold-soft: #ead7a3;
      --line:      #eadfc7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.7;
    }

    img { max-width: 100%; display: block; }

    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.92);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--gold);
    }
    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 14px;
    }
    .nav-links a { color: var(--ink); }
    .nav-links a.active { color: var(--gold); font-weight: 700; }

    /* ── Page intro ──────────────────────────────────────── */
    .page-intro { padding: 44px 0 8px; }

    h2 {
      margin: 0 0 18px;
      font-size: 30px;
      line-height: 1.25;
    }

    .lead {
      margin: 0;
      max-width: 640px;
      font-size: 16px;
      color: var(--muted);
    }

    /* ── Jump Nav ────────────────────────────────────────── */
    .jump-wrap { padding: 28px 0 40px; }

    .jump-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .jump-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .jump-list a {
      display: inline-block;
      padding: 6px 13px;
      border-radius: 999px;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    .jump-list a:hover {
      border-color: var(--gold);
      color: var(--gold);
      text-decoration: none;
    }

    /* ── Theme Card ──────────────────────────────────────── */
    #themes-container { padding-bottom: 60px; }

    .theme-card {
      background: var(--paper);
      border-radius: 22px;
      border: 1px solid var(--line);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(90, 65, 25, 0.06);
    }
    .theme-head {
      display: flex;
      align-items: stretch;
    }
    .theme-preview {
      width: 240px;
      min-width: 160px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--line);
      cursor: pointer;
      position: relative;
    }
    .theme-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s ease;
    }
    .theme-preview:hover img { transform: scale(1.04); }
    .theme-preview::after {
      content: '⤢';
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 1.1rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.15s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .theme-preview:hover::after { opacity: 1; }

    .theme-meta {
      flex: 1;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .theme-eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .theme-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin: 0;
    }
    .theme-caption {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }
    .they-heard {
      color: var(--gold);
      font-weight: 700;
      font-style: normal;
    }
    .badge-new {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      align-self: flex-start;
    }

    /* ── Items Block ─────────────────────────────────────── */
    .items-block {
      padding: 16px 22px 20px;
      border-top: 1px solid var(--line);
    }
    .items-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .items-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
    }
    .item-card {
      background: var(--bg);
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 6px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .item-card:hover {
      border-color: var(--gold-soft);
      box-shadow: 0 4px 12px rgba(90, 65, 25, 0.1);
      transform: translateY(-2px);
    }
    .item-card img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      display: block;
      margin: 0 auto 6px;
    }
    .item-card .item-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      line-height: 1.3;
    }
    .bg-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .bg-grid .item-card img {
      width: 100%;
      height: 78px;
      object-fit: cover;
      border-radius: 6px;
    }

    /* ── Coming Soon ─────────────────────────────────────── */
    .coming-soon-strip {
      background: var(--gold);
      color: #fff;
      text-align: center;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(58, 48, 34, 0.82);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--paper);
      border-radius: 22px;
      border: 1px solid var(--line);
      padding: 28px 22px 20px;
      max-width: min(88vw, 520px);
      max-height: 90vh;
      overflow: auto;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.2s ease;
      box-shadow: 0 20px 60px rgba(58, 48, 34, 0.25);
    }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 50%;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .modal-close:hover {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);
    }
    .modal-nav-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .modal-nav-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gold-soft);
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1;
    }
    .modal-nav-btn:hover:not(:disabled) {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);
    }
    .modal-nav-btn:disabled { opacity: 0.25; cursor: default; }
    .modal-img-wrap { flex: 1; text-align: center; min-width: 0; }
    .modal-img-wrap img {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
    }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }
    .modal-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .modal-counter {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      padding: 40px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 720px) {
      .nav-links  { display: none; }
      .theme-head { flex-direction: column; }
      .theme-preview { width: 100%; min-width: unset; max-height: 160px; }
      .theme-meta { padding: 16px; }
      .theme-title { font-size: 18px; }
      .items-block { padding: 12px 16px 16px; }
      .items-grid  { grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); gap: 6px; }
      .item-card img { width: 50px; height: 50px; }
      .bg-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .bg-grid .item-card img { height: 64px; }
    }
  </style>
</head>

  const li = document.createElement('li');

});

// ── Item card builder ─────────────────────────────────────────
function itemCard(id, name, type) {
  const dir = type === 'chr' ? 'characters' : type === 'fur' ? 'furniture' : 'backgrounds';
  const src = `images/${dir}/${id}.png`;
  return `<div class="item-card"
               data-modal-src="${src}"
               data-modal-label="${name}">
    <img src="${src}" alt="${name}" loading="lazy" onerror="this.style.opacity='0.25'">
    <div class="item-name">${name}</div>
  </div>`;
}

// ── Build Theme Sections ──────────────────────────────────────
const container = document.getElementById('themes-container');

themes.forEach(t => {
  const comingSoon = t.num >= '006';
  const sec = document.createElement('section');
  sec.className = 'theme-card';
  sec.id        = t.id;
  sec.innerHTML = `
    ${comingSoon ? '<div class="coming-soon-strip">Coming Soon</div>' : ''}
    <div class="theme-head">
      <div class="theme-preview"
           data-modal-src="${t.preview}"
           data-modal-label="${t.name}">
        <img src="${t.preview}" alt="${t.name} — theme preview" loading="lazy"
             onerror="this.style.opacity='0.15'">
      </div>
      <div class="theme-meta">
        <div class="theme-eyebrow">Theme ${t.num}</div>
        <h3 class="theme-title">${t.name}</h3>
        <p class="theme-caption">
          <span class="they-heard">They heard...</span> ${t.desc}
        </p>
        ${t.isNew ? '<span class="badge-new">New</span>' : ''}
      </div>
    </div>
    <div class="items-block">
      <div class="items-heading">Characters</div>
      <div class="items-grid">${t.chr.map(([id, name]) => itemCard(id, name, 'chr')).join('')}</div>
    </div>
    <div class="items-block">
      <div class="items-heading">Furniture</div>
      <div class="items-grid">${t.fur.map(([id, name]) => itemCard(id, name, 'fur')).join('')}</div>
    </div>
    <div class="items-block">
      <div class="items-heading">Background</div>
      <div class="items-grid bg-grid">${t.bg.map(([id, name]) => itemCard(id, name, 'bg')).join('')}</div>
    </div>`;
  container.appendChild(sec);
});

// ── Modal Logic ───────────────────────────────────────────────
const overlay      = document.getElementById('modal-overlay');
const modalImg     = document.getElementById('modal-img');
const modalLabel   = document.getElementById('modal-label');
const modalCounter = document.getElementById('modal-counter');
const modalBox     = document.getElementById('modal-box');
const prevBtn      = document.getElementById('modal-prev');
const nextBtn      = document.getElementById('modal-next');

let zoomables    = [];
let currentIndex = 0;

function collectZoomables() {
  zoomables = Array.from(document.querySelectorAll('[data-modal-src]'));
}

function showAt(index) {
  currentIndex = index;
  const el = zoomables[index];
  modalImg.src             = el.dataset.modalSrc;
  modalImg.alt             = el.dataset.modalLabel;
  modalLabel.textContent   = el.dataset.modalLabel;
  modalCounter.textContent = `${index + 1} / ${zoomables.length}`;
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === zoomables.length - 1;
}

function openModal(index) {
  showAt(index);
  overlay.classList.add('open');
  overlay.removeAttribute('aria-hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < zoomables.length) showAt(next);
}

document.getElementById('themes-container').addEventListener('click', e => {
  const target = e.target.closest('[data-modal-src]');
  if (!target) return;
  const index = zoomables.indexOf(target);
  openModal(index >= 0 ? index : 0);
});

prevBtn.addEventListener('click', () => navigate(-1));
nextBtn.addEventListener('click', () => navigate(1));

overlay.addEventListener('click', e => {
  if (!modalBox.contains(e.target)) closeModal();
});

document.getElementById('modal-close').addEventListener('click', closeModal);

document.addEventListener('keydown', e => {
  if (!overlay.classList.contains('open')) return;
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

collectZoomables();
</script>
